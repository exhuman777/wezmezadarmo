name: RSS Cache Fetch

on:
  schedule:
    # 08:00 i 16:00 czasu polskiego (UTC+2 latem)
    - cron: '0 6,14 * * *'
  # Ręczne uruchomienie z GitHub UI (do testów)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds and cache to Supabase
        run: node scripts/fetch-rss-cache.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Report status
        if: failure()
        run: echo "RSS fetch failed - sprawdź logi powyżej"
