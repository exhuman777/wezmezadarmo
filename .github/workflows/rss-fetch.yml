name: RSS Cache Fetch

on:
  schedule:
    # 10:00 i 15:00 czasu polskiego (CEST = UTC+2 latem, CET = UTC+1 zimą)
    # Latem trafia w 10:00 i 15:00, zimą w 09:00 i 14:00 - akceptowalne
    - cron: '0 8,13 * * *'
  # Ręczne uruchomienie z GitHub UI (do testów)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds and cache to Supabase
        run: node scripts/fetch-rss-cache.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Report status
        if: failure()
        run: echo "RSS fetch failed - sprawdź logi powyżej"
